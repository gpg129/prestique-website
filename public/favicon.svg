<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a2e4a"/>
  <!-- Hexagon outline -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="white" stroke-width="1.8" opacity="0.9"/>
  <!-- Cube top face (blue) -->
  <polygon points="16,8 24,13 16,18 8,13" fill="#3b82f6" opacity="0.95"/>
  <!-- Cube left face (light) -->
